name: Docker CI

on:
  push:
    paths-ignore: 
      - charts/**

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SALTCORN_VERSION: "1.1.3"
    strategy:
      matrix:
        node_version: ["18.20", "20.19", "22.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get branch name
        run: echo "BRANCH=$(echo ${GITHUB_REF#refs/heads/})" >> $GITHUB_ENV

      - name: Read version from file
        id: read_version
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_ENV

      - name: Build and push (Branch)
        if: github.ref != 'refs/heads/master'
        uses: docker/build-push-action@v6
        with:
          build-args: |
            NODE_BASE_IMAGE=${{ matrix.node_version }}-alpine3.21
            SALTCORN_VERSION=${{ env.SALTCORN_VERSION }}
          context: .
          file: Dockerfile.release.node
          push: true
          provenance: mode=max
          sbom: true
          tags: ${{ github.repository }}:${{ env.BRANCH }}-node${{ matrix.node_version }}

      - name: Run Trivy vulnerability scanner (Branch)
        if: github.ref != 'refs/heads/master'
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: 'docker.io/${{ github.repository }}:${{ env.BRANCH }}-node${{ matrix.node_version }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Build and push (Main)
        if: github.ref == 'refs/heads/master'
        uses: docker/build-push-action@v6
        with:
          build-args: |
            NODE_BASE_IMAGE=${{ matrix.node_version }}-alpine3.21
            SALTCORN_VERSION=${{ env.SALTCORN_VERSION }}
          context: .
          file: Dockerfile.release.node
          push: true
          provenance: mode=max
          sbom: true
          tags: ${{ github.repository }}:${{ env.VERSION }}-node${{ matrix.node_version }}

      - name: Run Trivy vulnerability scanner (Main)
        if: github.ref == 'refs/heads/master'
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: 'docker.io/${{ github.repository }}:${{ env.VERSION }}-node${{ matrix.node_version }}'
          format: 'github'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library,fs,repo'
          severity: 'CRITICAL,HIGH'